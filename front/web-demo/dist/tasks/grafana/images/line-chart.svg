<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" role="img" aria-label="Line chart">
  <!-- Grid -->
  <g stroke="#1f2d44" stroke-width="1">
    <line x1="30" y1="40"  x2="280" y2="40"/>
    <line x1="30" y1="80"  x2="280" y2="80"/>
    <line x1="30" y1="120" x2="280" y2="120"/>
    <line x1="30" y1="160" x2="280" y2="160"/>
    <line x1="80"  y1="30" x2="80"  y2="170"/>
    <line x1="130" y1="30" x2="130" y2="170"/>
    <line x1="180" y1="30" x2="180" y2="170"/>
    <line x1="230" y1="30" x2="230" y2="170"/>
  </g>
  <!-- Axes -->
  <line x1="30" y1="170" x2="280" y2="170" stroke="#3c506e" stroke-width="1.5"/>
  <line x1="30" y1="30"  x2="30"  y2="170" stroke="#3c506e" stroke-width="1.5"/>
  <!-- Area fill -->
  <path d="M 30 140 C 60 130, 90 110, 130 95 S 200 65, 230 55 S 280 50, 280 50 L 280 170 L 30 170 Z"
        fill="#38b8d0" fill-opacity="0.12"/>
  <!-- Line -->
  <path d="M 30 140 C 60 130, 90 110, 130 95 S 200 65, 230 55 S 280 50, 280 50"
        fill="none" stroke="#38b8d0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Data points -->
  <g fill="#e8d0a8">
    <circle cx="30"  cy="140" r="2.5"/>
    <circle cx="80"  cy="118" r="2.5"/>
    <circle cx="130" cy="95"  r="2.5"/>
    <circle cx="180" cy="78"  r="2.5"/>
    <circle cx="230" cy="55"  r="2.5"/>
    <circle cx="280" cy="50"  r="2.5"/>
  </g>
</svg>
