<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drag & Drop Template</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #0d1b2a;
  --bg2:    #111f30;
  --card:   #1a2e42;
  --text:   #E8D0A8;
  --muted:  #8fa3b3;
  --gold:   #E8D0A8;
  --cyan:   #38B8D0;
  --border: rgba(232,208,168,.13);
  --panel:  rgba(255,255,255,.05);
  --panel2: rgba(255,255,255,.09);
  --shadow: 0 10px 30px rgba(0,0,0,.45);
  --radius: 13px;
  --font-mono: 'Consolas','Menlo','DejaVu Sans Mono','Courier New',monospace;
  --font-ui:   'Segoe UI',system-ui,-apple-system,'Ubuntu',sans-serif;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-mono);
}

.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: clamp(14px, 2.2vw, 28px);
}

.task-header {
  font-family: var(--font-ui);
  font-size: clamp(20px, 2.4vw, 28px);
  font-weight: 900;
  color: var(--gold);
  margin-bottom: 6px;
}

.task-desc {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.7;
  margin-bottom: 20px;
  max-width: 620px;
}

.infobox {
  background: var(--panel);
  border: 1px solid var(--cyan);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 20px;
}
.infobox h4 {
  font-family: var(--font-ui);
  font-size: 15px;
  font-weight: 800;
  margin-bottom: 10px;
  color: var(--cyan);
}
.infobox p {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.8;
}

.startbtn {
  margin-top: 16px;
  padding: 10px 24px;
  background: var(--cyan);
  border: none;
  border-radius: 8px;
  font-family: var(--font-mono);
  font-weight: 800;
  font-size: 13px;
  color: #000;
  cursor: pointer;
  transition: opacity .15s;
}
.startbtn:hover { opacity: .85; }

.complete-banner {
  text-align: center;
  font-family: var(--font-ui);
  font-size: 22px;
  font-weight: 900;
  color: var(--cyan);
  padding: 16px;
  background: rgba(56,184,208,.08);
  border: 1px solid var(--cyan);
  border-radius: 12px;
  margin-bottom: 20px;
  display: none;
}

.messagebox {
  text-align: center;
  font-size: 13px;
  font-weight: 800;
  padding: 10px 20px;
  border-radius: 8px;
  margin-bottom: 16px;
  display: none;
}
.message-correct { background: rgba(74,222,128,.15); color: #4ade80; border: 1px solid #4ade80; }
.message-wrong   { background: rgba(248,113,113,.15); color: #f87171; border: 1px solid #f87171; }

#task-area { display: none; }

.taskbox {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 16px;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 20px;
  line-height: 1.7;
}

/* ── Two-column split: items left, slots right ── */
.split-layout {
  display: flex;
  gap: 20px;
  align-items: flex-start;
}

.drag-source {
  width: clamp(180px, 22vw, 260px);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: 14px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  position: sticky;
  top: 20px;
}

.drag-source-label {
  font-size: 10px;
  font-weight: 800;
  color: var(--muted);
  letter-spacing: 1.3px;
  text-transform: uppercase;
}

.drag-item {
  padding: 10px 14px;
  background: rgba(56,184,208,.10);
  border: 1px solid var(--cyan);
  border-radius: 8px;
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 700;
  color: var(--cyan);
  cursor: grab;
  user-select: none;
  transition: transform .12s, box-shadow .12s, opacity .12s;
}
.drag-item:active { cursor: grabbing; }
.drag-item.dragging { opacity: .45; transform: scale(.95); }

.drop-grid {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(clamp(180px, 18vw, 260px), 1fr));
  gap: 14px;
}

.drop-slot {
  background: var(--panel);
  border: 2px dashed rgba(56,184,208,.4);
  border-radius: var(--radius);
  padding: 16px;
  min-height: 100px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 8px;
  transition: border-color .15s, background .15s;
}
.drop-slot.drag-over {
  border-color: var(--cyan);
  background: rgba(56,184,208,.06);
}

.slot-label {
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 800;
  color: var(--gold);
  text-align: center;
}

.slot-hint {
  font-size: 10px;
  color: var(--muted);
  text-align: center;
}

.slot-droparea {
  width: 100%;
  min-height: 44px;
  border: 1px dashed rgba(232,208,168,.25);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  color: rgba(232,208,168,.35);
  transition: border-color .15s, background .15s;
}

.drop-slot.correct {
  border-color: #4ade80;
  border-style: solid;
  background: rgba(74,222,128,.08);
}
.drop-slot.correct .slot-droparea {
  border-color: #4ade80;
  background: rgba(74,222,128,.10);
  color: #4ade80;
  font-weight: 700;
}

.drop-slot.wrong-flash {
  border-color: #f87171;
  background: rgba(248,113,113,.08);
}

.reset-btn {
  margin-top: 20px;
  padding: 8px 18px;
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 8px;
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 12px;
  cursor: pointer;
  transition: background .14s;
}
.reset-btn:hover { background: var(--panel2); }
</style>
</head>
<body>

<div class="container">
  <div class="task-header">Insert title here</div>
  <div class="task-desc">Insert task description here.</div>

  <div id="infobox" class="infobox">
    <h4>Insert info title here</h4>
    <p>Insert explanation text here.</p>
    <button class="startbtn" onclick="startTask()">Start oppgave</button>
  </div>

  <div id="complete-banner" class="complete-banner">&#10003; Insert completion message here!</div>
  <div id="flash-msg" class="messagebox"></div>

  <div id="task-area">
    <div class="taskbox">Insert instructions here. Drag items from the left panel into their matching slots on the right.</div>

    <div class="split-layout">
      <div class="drag-source" id="drag-source">
        <div class="drag-source-label">Insert label here</div>
      </div>
      <div class="drop-grid" id="drop-grid"></div>
    </div>

    <button class="reset-btn" onclick="resetTask()">Reset</button>
  </div>
</div>

<script>
// ==============================================================
//  CONFIGURATION
//  Each entry: { id, itemLabel, slotLabel, slotHint }
//  An item matches a slot when their id values match.
//  Both item order and slot positions are shuffled every run.
// ==============================================================

const PAIRS = [
  { id: 'a', itemLabel: 'Insert item text 1', slotLabel: 'Insert slot title 1', slotHint: 'Insert hint 1' },
  { id: 'b', itemLabel: 'Insert item text 2', slotLabel: 'Insert slot title 2', slotHint: 'Insert hint 2' },
  { id: 'c', itemLabel: 'Insert item text 3', slotLabel: 'Insert slot title 3', slotHint: 'Insert hint 3' },
  { id: 'd', itemLabel: 'Insert item text 4', slotLabel: 'Insert slot title 4', slotHint: 'Insert hint 4' },
  { id: 'e', itemLabel: 'Insert item text 5', slotLabel: 'Insert slot title 5', slotHint: 'Insert hint 5' },
  { id: 'f', itemLabel: 'Insert item text 6', slotLabel: 'Insert slot title 6', slotHint: 'Insert hint 6' },
];

// ==============================================================

let correctCount = 0;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function flashMsg(text, ok) {
  const el = document.getElementById('flash-msg');
  el.textContent = text;
  el.className = 'messagebox ' + (ok ? 'message-correct' : 'message-wrong');
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 900);
}

function buildItems() {
  const source = document.getElementById('drag-source');
  source.innerHTML = '<div class="drag-source-label">Insert label here</div>';

  shuffle(PAIRS).forEach(p => {
    const el = document.createElement('div');
    el.className = 'drag-item';
    el.draggable = true;
    el.textContent = p.itemLabel;
    el.dataset.id = p.id;

    el.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text/plain', p.id);
      e.dataTransfer.effectAllowed = 'move';
      el.classList.add('dragging');
    });
    el.addEventListener('dragend', () => el.classList.remove('dragging'));
    source.appendChild(el);
  });
}

function buildSlots() {
  const grid = document.getElementById('drop-grid');
  grid.innerHTML = '';
  correctCount = 0;

  shuffle(PAIRS).forEach(p => {
    const slot = document.createElement('div');
    slot.className = 'drop-slot';
    slot.dataset.expects = p.id;
    slot.innerHTML =
      '<div class="slot-label">' + p.slotLabel + '</div>' +
      '<div class="slot-hint">' + p.slotHint + '</div>' +
      '<div class="slot-droparea">Drop here</div>';

    slot.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      slot.classList.add('drag-over');
    });
    slot.addEventListener('dragleave', () => slot.classList.remove('drag-over'));

    slot.addEventListener('drop', e => {
      e.preventDefault();
      slot.classList.remove('drag-over');
      if (slot.classList.contains('correct')) return;
      handleDrop(slot, e.dataTransfer.getData('text/plain'));
    });

    grid.appendChild(slot);
  });
}

function handleDrop(slot, itemId) {
  const ok = itemId === slot.dataset.expects;
  const item = document.querySelector('.drag-item[data-id="' + itemId + '"]');

  if (ok) {
    slot.classList.add('correct');
    const droparea = slot.querySelector('.slot-droparea');
    const pair = PAIRS.find(p => p.id === itemId);
    droparea.textContent = pair ? pair.itemLabel : itemId;
    if (item) item.remove();
    correctCount++;
    flashMsg('\u2713 Correct!', true);
    if (correctCount >= PAIRS.length) {
      document.getElementById('complete-banner').style.display = 'block';
    }
  } else {
    slot.classList.add('wrong-flash');
    flashMsg('\u2717 Try again', false);
    setTimeout(() => slot.classList.remove('wrong-flash'), 800);
  }
}

function startTask() {
  document.getElementById('infobox').style.display = 'none';
  document.getElementById('task-area').style.display = 'block';
  document.getElementById('complete-banner').style.display = 'none';
  buildItems();
  buildSlots();
}

function resetTask() {
  document.getElementById('complete-banner').style.display = 'none';
  buildItems();
  buildSlots();
}
</script>
</body>
</html>
